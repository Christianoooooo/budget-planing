<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BudgetPlaner</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* ===== CSS CUSTOM PROPERTIES ===== */
:root {
  --bg-primary: #0f1117;
  --bg-secondary: #1a1d27;
  --bg-tertiary: #242736;
  --bg-card: #1e2130;
  --border: #2e3248;
  --text-primary: #e8eaf0;
  --text-secondary: #8b8fa8;
  --text-muted: #565a73;
  --accent-blue: #4f8ef7;
  --accent-green: #3ecf8e;
  --accent-red: #f16767;
  --accent-yellow: #f5c542;
  --accent-purple: #a78bfa;
  --accent-orange: #fb923c;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --radius: 12px;
  --radius-sm: 8px;
  --transition: 0.2s ease;
  --sidebar-width: 240px;
  --nav-height: 64px;
}
[data-theme="light"] {
  --bg-primary: #f0f2f8;
  --bg-secondary: #ffffff;
  --bg-tertiary: #e8ebf4;
  --bg-card: #ffffff;
  --border: #d4d8ec;
  --text-primary: #1a1d2e;
  --text-secondary: #5a5f7a;
  --text-muted: #9095b0;
  --shadow: 0 4px 24px rgba(0,0,0,0.08);
}

/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.5;
  min-height: 100vh;
  transition: background var(--transition), color var(--transition);
}
a { color: var(--accent-blue); text-decoration: none; }
button { cursor: pointer; font-family: inherit; border: none; outline: none; }
input, select, textarea { font-family: inherit; outline: none; }

/* ===== LAYOUT ===== */
.app-layout {
  display: flex;
  min-height: 100vh;
}

/* ===== SIDEBAR ===== */
.sidebar {
  width: var(--sidebar-width);
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 100;
  transition: transform var(--transition);
}
.sidebar-logo {
  padding: 24px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid var(--border);
}
.sidebar-logo .logo-icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.sidebar-logo .logo-text {
  font-size: 18px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.sidebar-nav {
  flex: 1;
  padding: 16px 12px;
  overflow-y: auto;
}
.nav-section-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  padding: 8px 8px 4px;
  margin-top: 8px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition);
  margin-bottom: 2px;
  user-select: none;
}
.nav-item:hover { background: var(--bg-tertiary); color: var(--text-primary); }
.nav-item.active { background: rgba(79,142,247,0.15); color: var(--accent-blue); }
.nav-item .nav-icon { font-size: 18px; width: 20px; text-align: center; }
.sidebar-footer {
  padding: 16px 12px;
  border-top: 1px solid var(--border);
}

/* ===== MAIN CONTENT ===== */
.main-content {
  flex: 1;
  margin-left: var(--sidebar-width);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
.topbar {
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 90;
}
.topbar-left { display: flex; align-items: center; gap: 16px; }
.topbar-title { font-size: 18px; font-weight: 600; }
.topbar-right { display: flex; align-items: center; gap: 12px; }
.page-content {
  padding: 24px;
  flex: 1;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

/* ===== BUTTONS ===== */
.btn {
  padding: 9px 18px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 500;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: all var(--transition);
}
.btn-primary {
  background: var(--accent-blue);
  color: #fff;
}
.btn-primary:hover { background: #3a7de8; transform: translateY(-1px); }
.btn-secondary {
  background: var(--bg-tertiary);
  color: var(--text-primary);
  border: 1px solid var(--border);
}
.btn-secondary:hover { background: var(--border); }
.btn-danger { background: var(--accent-red); color: #fff; }
.btn-danger:hover { background: #d85252; }
.btn-ghost {
  background: transparent;
  color: var(--text-secondary);
  padding: 8px 10px;
}
.btn-ghost:hover { background: var(--bg-tertiary); color: var(--text-primary); }
.btn-sm { padding: 6px 12px; font-size: 13px; }
.btn-icon {
  padding: 8px;
  border-radius: var(--radius-sm);
  background: var(--bg-tertiary);
  color: var(--text-secondary);
  border: 1px solid var(--border);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 36px; height: 36px;
}
.btn-icon:hover { color: var(--text-primary); }

/* ===== CARDS ===== */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
}
.card-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 12px;
}

/* ===== STAT CARDS ===== */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  position: relative;
  overflow: hidden;
}
.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
}
.stat-card.income::before { background: var(--accent-green); }
.stat-card.expense::before { background: var(--accent-red); }
.stat-card.savings::before { background: var(--accent-blue); }
.stat-card.balance::before { background: var(--accent-purple); }
.stat-label { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; }
.stat-value { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
.stat-value.positive { color: var(--accent-green); }
.stat-value.negative { color: var(--accent-red); }
.stat-value.neutral { color: var(--accent-blue); }
.stat-change { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

/* ===== GRIDS ===== */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }

/* ===== CHARTS ===== */
.chart-container {
  position: relative;
  width: 100%;
}
.chart-container canvas { max-width: 100%; }

/* ===== FORMS ===== */
.form-group { margin-bottom: 16px; }
.form-label {
  display: block;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  margin-bottom: 6px;
}
.form-control {
  width: 100%;
  padding: 10px 14px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-size: 14px;
  transition: border-color var(--transition);
}
.form-control:focus { border-color: var(--accent-blue); }
.form-control::placeholder { color: var(--text-muted); }
.form-control.error { border-color: var(--accent-red); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-error { font-size: 12px; color: var(--accent-red); margin-top: 4px; }

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
  animation: overlayIn 0.15s ease;
}
@keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  width: 100%;
  max-width: 480px;
  max-height: 90vh;
  overflow-y: auto;
  animation: modalIn 0.2s ease;
  box-shadow: var(--shadow);
}
@keyframes modalIn {
  from { opacity: 0; transform: scale(0.95) translateY(-10px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
.modal-header {
  padding: 20px 20px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.modal-title { font-size: 18px; font-weight: 600; }
.modal-body { padding: 20px; }
.modal-footer {
  padding: 0 20px 20px;
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}

/* ===== TRANSACTIONS ===== */
.filter-bar {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.search-box {
  flex: 1;
  min-width: 200px;
  position: relative;
}
.search-box input {
  width: 100%;
  padding: 9px 14px 9px 38px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-size: 14px;
  transition: border-color var(--transition);
}
.search-box input:focus { border-color: var(--accent-blue); }
.search-box .search-icon {
  position: absolute;
  left: 12px; top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  font-size: 14px;
}
.transaction-list { display: flex; flex-direction: column; gap: 2px; }
.transaction-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 16px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  transition: background var(--transition);
}
.transaction-item:hover { background: var(--bg-tertiary); }
.transaction-item:hover .tx-actions { opacity: 1; }
.tx-icon {
  width: 40px; height: 40px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.tx-info { flex: 1; min-width: 0; }
.tx-desc { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tx-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.tx-amount { font-size: 15px; font-weight: 600; text-align: right; flex-shrink: 0; }
.tx-amount.income { color: var(--accent-green); }
.tx-amount.expense { color: var(--accent-red); }
.tx-amount.fixed { color: var(--accent-yellow); }
.tx-actions {
  display: flex;
  gap: 4px;
  opacity: 0;
  transition: opacity var(--transition);
}

/* ===== BADGES ===== */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
}
.badge-green { background: rgba(62,207,142,0.15); color: var(--accent-green); }
.badge-red { background: rgba(241,103,103,0.15); color: var(--accent-red); }
.badge-yellow { background: rgba(245,197,66,0.15); color: var(--accent-yellow); }
.badge-blue { background: rgba(79,142,247,0.15); color: var(--accent-blue); }

/* ===== PROGRESS BARS ===== */
.progress-bar {
  height: 8px;
  background: var(--bg-tertiary);
  border-radius: 4px;
  overflow: hidden;
  margin: 6px 0;
}
.progress-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.5s ease;
}
.progress-fill.green { background: var(--accent-green); }
.progress-fill.yellow { background: var(--accent-yellow); }
.progress-fill.red { background: var(--accent-red); }

/* ===== CATEGORY BUDGETS ===== */
.category-budget-item {
  padding: 16px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 10px;
}
.category-budget-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.category-budget-name {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 14px;
  font-weight: 500;
}
.category-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.category-budget-amounts { font-size: 13px; color: var(--text-secondary); }

/* ===== THEME TOGGLE ===== */
.theme-toggle {
  width: 44px; height: 24px;
  background: var(--bg-tertiary);
  border-radius: 12px;
  border: 1px solid var(--border);
  position: relative;
  cursor: pointer;
  transition: background var(--transition);
}
.theme-toggle::after {
  content: '';
  position: absolute;
  width: 18px; height: 18px;
  background: var(--text-secondary);
  border-radius: 50%;
  top: 2px; left: 2px;
  transition: transform var(--transition), background var(--transition);
}
[data-theme="light"] .theme-toggle::after {
  transform: translateX(20px);
  background: var(--accent-blue);
}

/* ===== TOASTS ===== */
.toast-container {
  position: fixed;
  bottom: 24px; right: 24px;
  z-index: 2000;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.toast {
  padding: 12px 18px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 10px;
  animation: toastIn 0.3s ease;
  box-shadow: var(--shadow);
  max-width: 320px;
}
.toast.success { background: var(--accent-green); color: #fff; }
.toast.error { background: var(--accent-red); color: #fff; }
.toast.info { background: var(--accent-blue); color: #fff; }
@keyframes toastIn {
  from { opacity: 0; transform: translateX(20px); }
  to { opacity: 1; transform: translateX(0); }
}

/* ===== MONTH SELECTOR ===== */
.month-selector {
  display: flex;
  align-items: center;
  gap: 8px;
}
.month-display {
  font-size: 15px;
  font-weight: 600;
  min-width: 140px;
  text-align: center;
}

/* ===== EMPTY STATE ===== */
.empty-state {
  text-align: center;
  padding: 48px 24px;
  color: var(--text-muted);
}
.empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; }
.empty-state h3 { font-size: 16px; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; }
.empty-state p { font-size: 14px; }

/* ===== BOTTOM NAV (mobile) ===== */
.bottom-nav {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--bg-secondary);
  border-top: 1px solid var(--border);
  z-index: 100;
  padding: 8px 0;
  padding-bottom: max(8px, env(safe-area-inset-bottom));
}
.bottom-nav-items {
  display: flex;
  justify-content: space-around;
}
.bottom-nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 6px 12px;
  color: var(--text-muted);
  font-size: 11px;
  cursor: pointer;
  transition: color var(--transition);
  border-radius: var(--radius-sm);
  border: none;
  background: transparent;
  flex: 1;
}
.bottom-nav-item .bnav-icon { font-size: 20px; }
.bottom-nav-item.active { color: var(--accent-blue); }

/* ===== HAMBURGER ===== */
.hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  padding: 8px;
  background: none;
  border: none;
}
.hamburger span {
  display: block;
  width: 22px; height: 2px;
  background: var(--text-secondary);
  border-radius: 2px;
  transition: all var(--transition);
}
.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 99;
}

/* ===== CONFIRM DIALOG ===== */
.confirm-dialog {
  text-align: center;
  padding: 8px 0;
}
.confirm-dialog .confirm-icon { font-size: 48px; margin-bottom: 12px; }
.confirm-dialog h3 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
.confirm-dialog p { font-size: 14px; color: var(--text-secondary); }

/* ===== SECTION HEADERS ===== */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.section-title { font-size: 18px; font-weight: 600; }

/* ===== MONTH REPORT ===== */
.report-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  margin-bottom: 6px;
  background: var(--bg-card);
  border: 1px solid var(--border);
}
.report-row.over { border-left: 3px solid var(--accent-red); }
.report-row.under { border-left: 3px solid var(--accent-green); }

/* ===== SAVINGS GOAL ===== */
.savings-goal-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
}
.savings-goal-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 12px;
}
.savings-goal-name { font-size: 15px; font-weight: 600; }
.savings-goal-amount { font-size: 13px; color: var(--text-secondary); }

/* ===== LOADING ===== */
.loading-screen {
  position: fixed;
  inset: 0;
  background: var(--bg-primary);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  flex-direction: column;
  gap: 16px;
}
.loading-spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--accent-blue);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .sidebar {
    transform: translateX(-100%);
  }
  .sidebar.open {
    transform: translateX(0);
  }
  .sidebar-overlay.show { display: block; }
  .main-content {
    margin-left: 0;
    padding-bottom: 80px;
  }
  .hamburger { display: flex; }
  .bottom-nav { display: block; }
  .grid-2 { grid-template-columns: 1fr; }
  .grid-3 { grid-template-columns: 1fr; }
  .form-row { grid-template-columns: 1fr; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .page-content { padding: 16px; }
  .filter-bar { flex-direction: column; }
  .toast-container { bottom: 90px; right: 12px; left: 12px; }
  .toast { max-width: 100%; }
  .tx-actions { opacity: 1; }
}
@media (max-width: 480px) {
  .stats-grid { grid-template-columns: 1fr; }
  .stat-value { font-size: 24px; }
}

/* ===== TYPE SELECTOR ===== */
.type-selector {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}
.type-btn {
  flex: 1;
  padding: 10px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  background: var(--bg-tertiary);
  border: 2px solid var(--border);
  color: var(--text-secondary);
  transition: all var(--transition);
}
.type-btn.active.income { border-color: var(--accent-green); color: var(--accent-green); background: rgba(62,207,142,0.1); }
.type-btn.active.expense { border-color: var(--accent-red); color: var(--accent-red); background: rgba(241,103,103,0.1); }
.type-btn.active.fixed { border-color: var(--accent-yellow); color: var(--accent-yellow); background: rgba(245,197,66,0.1); }

/* ===== RECURRING BADGE ===== */
.recurring-icon { font-size: 12px; color: var(--accent-purple); }

/* ===== DIVIDER ===== */
.divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ===== SETTINGS SECTION ===== */
.settings-group { margin-bottom: 24px; }
.settings-group-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.settings-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0;

</head>
<body>

        <span class="bnav-icon">📅</span><span>Planung</span>
      </button>

        <span class="bnav-icon">⚙️</span><span>Einst.</span>
      </button>

  </nav>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<!-- Modal Container -->
<div id="modalContainer"></div>

<script>
// ============================================================
// STATE MANAGEMENT
// ============================================================
const STATE_KEY = 'budgetplaner_state';

const DEFAULT_CATEGORIES = [
  { id: 'housing',     name: 'Wohnen',       icon: '🏠', color: '#4f8ef7', budget: 1000 },
  { id: 'food',        name: 'Lebensmittel', icon: '🛒', color: '#3ecf8e', budget: 400  },
  { id: 'transport',   name: 'Transport',    icon: '🚗', color: '#fb923c', budget: 200  },
  { id: 'leisure',     name: 'Freizeit',     icon: '🎮', color: '#a78bfa', budget: 150  },
  { id: 'health',      name: 'Gesundheit',   icon: '💊', color: '#f16767', budget: 100  },
  { id: 'insurance',   name: 'Versicherung', icon: '🛡️', color: '#f5c542', budget: 200  },
  { id: 'savings',     name: 'Sparen',       icon: '💰', color: '#38bdf8', budget: 300  },
  { id: 'other',       name: 'Sonstiges',    icon: '📦', color: '#94a3b8', budget: 100  },
];

function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

function getDemoData() {
  const now = new Date();
  const y = now.getFullYear();
  const m = now.getMonth();
  const pad = n => String(n).padStart(2,'0');
  const d = (day) => `${y}-${pad(m+1)}-${pad(day)}`;

  return [
    { id: generateId(), type: 'income',  amount: 3200,  category: 'other',     description: 'Gehalt',                date: d(1),  recurring: 'monthly' },
    { id: generateId(), type: 'income',  amount: 350,   category: 'other',     description: 'Freelance Projekt',     date: d(5),  recurring: null },
    { id: generateId(), type: 'fixed',   amount: 850,   category: 'housing',   description: 'Miete',                 date: d(1),  recurring: 'monthly' },
    { id: generateId(), type: 'fixed',   amount: 89,    category: 'insurance', description: 'KFZ-Versicherung',      date: d(3),  recurring: 'monthly' },
    { id: generateId(), type: 'fixed',   amount: 45,    category: 'insurance', description: 'Haftpflicht',           date: d(3),  recurring: 'monthly' },
    { id: generateId(), type: 'fixed',   amount: 12.99, category: 'leisure',   description: 'Netflix',               date: d(5),  recurring: 'monthly' },
    { id: generateId(), type: 'fixed',   amount: 9.99,  category: 'leisure',   description: 'Spotify',               date: d(5),  recurring: 'monthly' },
    { id: generateId(), type: 'expense', amount: 67.40, category: 'food',      description: 'Edeka Wocheneinkauf',   date: d(4),  recurring: null },
    { id: generateId(), type: 'expense', amount: 54.20, category: 'food',      description: 'Wocheneinkauf',         date: d(8),  recurring: null },
    { id: generateId(), type: 'expense', amount: 43.80, category: 'food',      description: 'Rewe',                  date: d(11), recurring: null },
    { id: generateId(), type: 'expense', amount: 38.50, category: 'transport', description: 'Tankfüllung',           date: d(6),  recurring: null },
    { id: generateId(), type: 'expense', amount: 49,    category: 'transport', description: 'ÖPNV Monatskarte',      date: d(1),  recurring: 'monthly' },
    { id: generateId(), type: 'expense', amount: 120,   category: 'leisure',   description: 'Restaurant Abend',      date: d(7),  recurring: null },
    { id: generateId(), type: 'expense', amount: 55,    category: 'leisure',   description: 'Kino & Bowling',        date: d(9),  recurring: null },
    { id: generateId(), type: 'expense', amount: 29.90, category: 'health',    description: 'Apotheke',              date: d(10), recurring: null },
    { id: generateId(), type: 'expense', amount: 200,   category: 'savings',   description: 'ETF Sparplan',          date: d(2),  recurring: 'monthly' },
    { id: generateId(), type: 'expense', amount: 100,   category: 'savings',   description: 'Notgroschen',           date: d(2),  recurring: 'monthly' },
    { id: generateId(), type: 'expense', amount: 34.99, category: 'other',     description: 'Amazon Bestellung',     date: d(12), recurring: null },
    { id: generateId(), type: 'expense', amount: 85,    category: 'health',    description: 'Zahnarzt Zuzahlung',    date: d(13), recurring: null },
  ];
}

function buildHistoricalData(transactions) {
  const now = new Date();
  const historical = [];
  for (let i = 5; i >= 1; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const y = d.getFullYear();
    const mo = d.getMonth();
    const pad = n => String(n).padStart(2,'0');
    const prefix = `${y}-${pad(mo+1)}`;
    const income  = 3200 + (Math.random()-0.5)*400;
    const expense = 1800 + (Math.random()-0.5)*400;
    const fixed   = 1000 + (Math.random()-0.5)*50;
    const ids = [];
    [
      { type:'income',  amount: Math.round(income),  category:'other', description:'Gehalt (hist.)', date:`${prefix}-01`, recurring:'monthly' },
      { type:'expense', amount: Math.round(expense),  category:'food',  description:'Lebenshaltung',  date:`${prefix}-15`, recurring:null },
      { type:'fixed',   amount: Math.round(fixed),    category:'housing',description:'Miete (hist.)', date:`${prefix}-01`, recurring:'monthly' },
    ].forEach(tx => {
      const t = { ...tx, id: generateId() };
      ids.push(t);
    });
    historical.push(...ids);
  }
  return historical;
}

function initState() {
  const saved = localStorage.getItem(STATE_KEY);
  if (saved) {
    try {
      const parsed = JSON.parse(saved);
      // Ensure categories exist
      if (!parsed.categories || parsed.categories.length === 0) {
        parsed.categories = DEFAULT_CATEGORIES;
      }
      return parsed;
    } catch(e) {}
  }
  const demo = getDemoData();
  const hist = buildHistoricalData([]);
  return {
    transactions: [...hist, ...demo],
    categories: DEFAULT_CATEGORIES.map(c => ({ ...c })),
    savingsGoal: { name: 'Urlaubsfonds', target: 2000, current: 450 },
    theme: 'dark',
    currentYear: new Date().getFullYear(),
    currentMonth: new Date().getMonth(),
  };
}

let state = initState();

function saveState() {
  localStorage.setItem(STATE_KEY, JSON.stringify(state));
}

// ============================================================
// UTILITIES
// ============================================================
function formatMoney(n) {
  return n.toLocaleString('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €';
}
function formatDate(dateStr) {
  if (!dateStr) return '';
  const [y,m,d] = dateStr.split('-');
  return `${d}.${m}.${y}`;
}
function getMonthName(year, month) {
  return new Date(year, month, 1).toLocaleDateString('de-DE', { month: 'long', year: 'numeric' });
}
function getCategoryById(id) {
  return state.categories.find(c => c.id === id) || { name: id, icon: '📦', color: '#94a3b8', budget: 0 };
}
function getTransactionsForMonth(year, month) {
  const prefix = `${year}-${String(month+1).padStart(2,'0')}`;
  return state.transactions.filter(t => t.date && t.date.startsWith(prefix));
}
function calcMonthStats(txs) {
  const income  = txs.filter(t => t.type === 'income').reduce((s,t) => s+t.amount, 0);
  const expense = txs.filter(t => t.type === 'expense').reduce((s,t) => s+t.amount, 0);
  const fixed   = txs.filter(t => t.type === 'fixed').reduce((s,t) => s+t.amount, 0);
  return { income, expense, fixed, total_out: expense+fixed, balance: income - expense - fixed };
}

// ============================================================
// TOASTS
// ============================================================
function showToast(msg, type = 'success', duration = 3000) {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  const icons = { success: '✓', error: '✕', info: 'ℹ' };
  toast.innerHTML = `<span>${icons[type]||'ℹ'}</span><span>${msg}</span>`;
  container.appendChild(toast);
  setTimeout(() => {
    toast.style.animation = 'toastIn 0.3s ease reverse';
    setTimeout(() => toast.remove(), 300);
  }, duration);
}

// ============================================================
// MODAL
// ============================================================
let currentModal = null;
function openModal(html, { title = '', onConfirm, confirmLabel = 'Speichern', confirmClass = 'btn-primary', showFooter = true } = {}) {
  closeModal();
  const container = document.getElementById('modalContainer');
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'modalOverlay';
  overlay.innerHTML = `
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h2 class="modal-title">${title}</h2>
        <button class="btn-ghost" id="modalCloseBtn" style="font-size:20px;line-height:1;">×</button>
      </div>
      <div class="modal-body">${html}</div>
      ${showFooter ? `<div class="modal-footer">
        <button class="btn btn-secondary" id="modalCancelBtn">Abbrechen</button>
        <button class="btn ${confirmClass}" id="modalConfirmBtn">${confirmLabel}</button>
      </div>` : ''}
    </div>
  `;
  container.appendChild(overlay);
  currentModal = overlay;

  overlay.querySelector('#modalCloseBtn').onclick = closeModal;
  if (showFooter) {
    overlay.querySelector('#modalCancelBtn').onclick = closeModal;
    overlay.querySelector('#modalConfirmBtn').onclick = () => {
      if (onConfirm) onConfirm();
    };
  }
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
  // focus first input
  setTimeout(() => { const inp = overlay.querySelector('input,select,textarea'); if(inp) inp.focus(); }, 50);

  document.addEventListener('keydown', handleModalKey);
}
function closeModal() {
  if (currentModal) {
    currentModal.remove();
    currentModal = null;
    document.removeEventListener('keydown', handleModalKey);
  }
}
function handleModalKey(e) {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'Enter' && !e.shiftKey) {
    const tag = document.activeElement?.tagName;
    if (tag !== 'TEXTAREA' && tag !== 'BUTTON') {
      const btn = document.getElementById('modalConfirmBtn');
      if (btn) btn.click();
    }
  }
}

// ============================================================
// ROUTING / PAGES
// ============================================================
const PAGE_TITLES = {
  dashboard: 'Dashboard',
  transactions: 'Transaktionen',
  categories: 'Kategorien & Budget',
  planning: 'Monatsplanung',
  settings: 'Einstellungen',
};
let currentPage = 'dashboard';
let chartInstances = {};

function navigate(page) {
  currentPage = page;
  document.getElementById('pageTitle').textContent = PAGE_TITLES[page] || page;
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.page === page);
  });
  document.querySelectorAll('.bottom-nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.page === page);
  });
  // destroy old charts
  Object.values(chartInstances).forEach(c => { try { c.destroy(); } catch(e){} });
  chartInstances = {};
  renderPage();
  closeSidebar();
}

function renderPage() {
  const el = document.getElementById('pageContent');
  el.style.animation = 'none'; el.offsetHeight; el.style.animation = '';
  switch(currentPage) {
    case 'dashboard':    el.innerHTML = renderDashboard(); initDashboardCharts(); break;
    case 'transactions': el.innerHTML = renderTransactions(); break;
    case 'categories':   el.innerHTML = renderCategories(); break;
    case 'planning':     el.innerHTML = renderPlanning(); initPlanningCharts(); break;
    case 'settings':     el.innerHTML = renderSettings(); break;
  }
  attachPageEvents();
}

// ============================================================
// DASHBOARD
// ============================================================
function renderDashboard() {
  const txs = getTransactionsForMonth(state.currentYear, state.currentMonth);
  const stats = calcMonthStats(txs);
  const savingsRate = stats.income > 0 ? ((stats.income - stats.total_out) / stats.income * 100) : 0;
  const goal = state.savingsGoal;
  const goalPct = goal.target > 0 ? Math.min((goal.current / goal.target) * 100, 100) : 0;
  const goalStatus = goalPct < 50 ? 'red' : goalPct < 80 ? 'yellow' : 'green';

  return `
  <div class="stats-grid">
    <div class="stat-card income">
      <div class="stat-label">Einnahmen</div>
      <div class="stat-value positive">${formatMoney(stats.income)}</div>
      <div class="stat-change">Diesen Monat</div>
    </div>
    <div class="stat-card expense">
      <div class="stat-label">Ausgaben gesamt</div>
      <div class="stat-value negative">${formatMoney(stats.total_out)}</div>
      <div class="stat-change">Fixkosten: ${formatMoney(stats.fixed)} | Variabel: ${formatMoney(stats.expense)}</div>
    </div>
    <div class="stat-card balance">
      <div class="stat-label">Bilanz</div>
      <div class="stat-value ${stats.balance >= 0 ? 'positive' : 'negative'}">${formatMoney(stats.balance)}</div>
      <div class="stat-change">${stats.balance >= 0 ? 'Überschuss' : 'Defizit'}</div>
    </div>
    <div class="stat-card savings">
      <div class="stat-label">Sparrate</div>
      <div class="stat-value neutral">${savingsRate.toFixed(1)} %</div>
      <div class="stat-change">Empfohlen: min. 20 %</div>
    </div>
  </div>

  <div class="grid-2" style="margin-bottom:16px;">
    <div class="card">
      <div class="card-title">Ausgaben nach Kategorie</div>
      <div class="chart-container" style="height:240px;display:flex;align-items:center;justify-content:center;">
        <canvas id="donutChart"></canvas>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Einnahmen vs. Ausgaben (6 Monate)</div>
      <div class="chart-container" style="height:240px;">
        <canvas id="barChart"></canvas>
      </div>
    </div>
  </div>

  <div class="grid-2">
    <div class="savings-goal-card">
      <div class="savings-goal-header">
        <div>
          <div class="savings-goal-name">🎯 ${goal.name}</div>
          <div class="savings-goal-amount">${formatMoney(goal.current)} von ${formatMoney(goal.target)}</div>
        </div>
        <button class="btn btn-secondary btn-sm" id="editSavingsGoalBtn">Bearbeiten</button>
      </div>
      <div class="progress-bar"><div class="progress-fill ${goalStatus}" style="width:${goalPct}%"></div></div>
      <div style="font-size:12px;color:var(--text-muted);margin-top:4px;">${goalPct.toFixed(1)} % erreicht · Noch ${formatMoney(Math.max(0, goal.target - goal.current))} fehlen</div>
    </div>
    <div class="card">
      <div class="card-title">Budget-Ampel</div>
      ${renderBudgetAmpel(txs)}
    </div>
  </div>
  `;
}

function renderBudgetAmpel(txs) {
  const byCategory = {};
  txs.filter(t => t.type !== 'income').forEach(t => {
    byCategory[t.category] = (byCategory[t.category] || 0) + t.amount;
  });
  const items = state.categories.filter(c => c.budget > 0 && byCategory[c.id] !== undefined).slice(0, 5);
  if (!items.length) return '<div style="color:var(--text-muted);font-size:13px;">Keine Ausgaben diesen Monat</div>';
  return items.map(cat => {
    const spent = byCategory[cat.id] || 0;
    const pct = Math.min((spent / cat.budget) * 100, 100);
    const status = pct < 70 ? 'green' : pct < 90 ? 'yellow' : 'red';
    return `<div style="margin-bottom:10px;">
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;">
        <span>${cat.icon} ${cat.name}</span>
        <span style="color:var(--text-secondary)">${formatMoney(spent)} / ${formatMoney(cat.budget)}</span>
      </div>
      <div class="progress-bar"><div class="progress-fill ${status}" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
}

function initDashboardCharts() {
  const txs = getTransactionsForMonth(state.currentYear, state.currentMonth);
  const isDark = document.documentElement.dataset.theme !== 'light';
  const textColor = isDark ? '#8b8fa8' : '#5a5f7a';
  const gridColor = isDark ? '#2e3248' : '#d4d8ec';

  // Donut chart
  const byCategory = {};
  txs.filter(t => t.type !== 'income').forEach(t => {
    byCategory[t.category] = (byCategory[t.category] || 0) + t.amount;
  });
  const catData = Object.entries(byCategory).map(([id, v]) => ({ cat: getCategoryById(id), val: v }));
  catData.sort((a,b) => b.val - a.val);

  const donutEl = document.getElementById('donutChart');
  if (donutEl) {
    if (catData.length === 0) {
      donutEl.parentElement.innerHTML = '<div class="empty-state"><div class="empty-icon">📊</div><p>Keine Ausgaben diesen Monat</p></div>';
    } else {
      chartInstances.donut = new Chart(donutEl, {
        type: 'doughnut',
        data: {
          labels: catData.map(d => d.cat.name),
          datasets: [{ data: catData.map(d => d.val), backgroundColor: catData.map(d => d.cat.color), borderWidth: 2, borderColor: isDark ? '#1e2130' : '#fff' }]
        },
        options: {
          responsive: true, maintainAspectRatio: true, cutout: '65%',
          plugins: {
            legend: { position: 'right', labels: { color: textColor, font: { size: 12 }, boxWidth: 12, padding: 10 } },
            tooltip: { callbacks: { label: ctx => ` ${formatMoney(ctx.parsed)}` } }
          }
        }
      });
    }
  }

  // Bar chart (6 months)
  const months = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date(state.currentYear, state.currentMonth - i, 1);
    months.push({ year: d.getFullYear(), month: d.getMonth(), label: d.toLocaleDateString('de-DE', { month: 'short' }) });
  }
  const incomeData = months.map(m => {
    const t = getTransactionsForMonth(m.year, m.month);
    return calcMonthStats(t).income;
  });
  const expData = months.map(m => {
    const t = getTransactionsForMonth(m.year, m.month);
    return calcMonthStats(t).total_out;
  });
  const barEl = document.getElementById('barChart');
  if (barEl) {
    chartInstances.bar = new Chart(barEl, {
      type: 'bar',
      data: {
        labels: months.map(m => m.label),
        datasets: [
          { label: 'Einnahmen', data: incomeData, backgroundColor: 'rgba(62,207,142,0.7)', borderRadius: 4 },
          { label: 'Ausgaben', data: expData, backgroundColor: 'rgba(241,103,103,0.7)', borderRadius: 4 },
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { labels: { color: textColor, font: { size: 12 } } },
          tooltip: { callbacks: { label: ctx => ` ${formatMoney(ctx.parsed.y)}` } }
        },
        scales: {
          x: { grid: { color: gridColor }, ticks: { color: textColor } },
          y: { grid: { color: gridColor }, ticks: { color: textColor, callback: v => v.toLocaleString('de-DE') + ' €' } }
        }
      }
    });
  }
}

// ============================================================
// TRANSACTIONS
// ============================================================
let txFilter = { search: '', category: '', type: '' };

function renderTransactions() {
  const txs = getTransactionsForMonth(state.currentYear, state.currentMonth);
  let filtered = txs.filter(t => {
    const cat = getCategoryById(t.category);
    const matchSearch = !txFilter.search || t.description.toLowerCase().includes(txFilter.search.toLowerCase()) || cat.name.toLowerCase().includes(txFilter.search.toLowerCase());
    const matchCat = !txFilter.category || t.category === txFilter.category;
    const matchType = !txFilter.type || t.type === txFilter.type;
    return matchSearch && matchCat && matchType;
  });
  filtered.sort((a,b) => b.date.localeCompare(a.date));

  const categoryOptions = state.categories.map(c => `<option value="${c.id}" ${txFilter.category===c.id?'selected':''}>${c.icon} ${c.name}</option>`).join('');

  return `
  <div class="section-header">

function renderTransactionItem(t) {
  const cat = getCategoryById(t.category);
  const typeColors = { income: 'rgba(62,207,142,0.15)', expense: 'rgba(241,103,103,0.15)', fixed: 'rgba(245,197,66,0.15)' };
  const sign = t.type === 'income' ? '+' : '-';
  return `
  <div class="transaction-item" data-id="${t.id}">
    <div class="tx-icon" style="background:${typeColors[t.type]};">${cat.icon}</div>
    <div class="tx-info">
      <div class="tx-desc">${escHtml(t.description)} ${t.recurring ? `<span class="recurring-icon" title="${t.recurring === 'monthly' ? 'Monatlich wiederkehrend' : 'Wöchentlich wiederkehrend'}">🔄</span>` : ''}</div>
      <div class="tx-meta">${cat.name} · ${formatDate(t.date)}</div>
    </div>
    <div class="tx-amount ${t.type}">${sign}${formatMoney(t.amount)}</div>
    <div class="tx-actions">
      <button class="btn-icon btn-sm edit-tx-btn" data-id="${t.id}" title="Bearbeiten" style="font-size:14px;">✏️</button>
      <button class="btn-icon btn-sm delete-tx-btn" data-id="${t.id}" title="Löschen" style="font-size:14px;">🗑️</button>
    </div>
  </div>`;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

  });

  // type buttons
  document.querySelectorAll('.type-btn').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.type-btn').forEach(b => b.className = `type-btn`);

      btn.classList.add('active', t);
      document.getElementById('txType').value = t;

function saveTransaction(editId) {
  const desc = document.getElementById('txDesc').value.trim();
  const amount = parseFloat(document.getElementById('txAmount').value);
  const date = document.getElementById('txDate').value;
  const category = document.getElementById('txCategory').value;
  const type = document.getElementById('txType').value;
  const recurring = document.getElementById('txRecurring').value || null;

  let valid = true;
  document.getElementById('txDescErr').textContent = '';
  document.getElementById('txAmountErr').textContent = '';
  document.getElementById('txDateErr').textContent = '';

  if (!desc) { document.getElementById('txDescErr').textContent = 'Beschreibung ist erforderlich'; valid = false; }
  if (!amount || amount <= 0) { document.getElementById('txAmountErr').textContent = 'Gültiger Betrag erforderlich'; valid = false; }
  if (!date) { document.getElementById('txDateErr').textContent = 'Datum ist erforderlich'; valid = false; }
  if (!valid) return;

  if (editId) {
    const idx = state.transactions.findIndex(t => t.id === editId);
    if (idx !== -1) state.transactions[idx] = { ...state.transactions[idx], desc, description: desc, amount, date, category, type, recurring };
    showToast('Transaktion aktualisiert');
  } else {
    state.transactions.push({ id: generateId(), description: desc, amount, date, category, type, recurring });
    showToast('Transaktion hinzugefügt');
  }
  saveState();
  closeModal();
  renderPage();
}

function renderCategories() {
  const txs = getTransactionsForMonth(state.currentYear, state.currentMonth);
  const byCategory = {};
  txs.filter(t => t.type !== 'income').forEach(t => {

  return `

  </div>

    ${state.categories.map(cat => {
      const spent = byCategory[cat.id] || 0;
      const pct = cat.budget > 0 ? Math.min((spent / cat.budget) * 100, 100) : 0;
      const status = pct < 70 ? 'green' : pct < 90 ? 'yellow' : 'red';
      const statusLabel = pct < 70 ? '✅ Im Rahmen' : pct < 90 ? '⚠️ Achtung' : '🔴 Überzogen';
      return `
      <div class="category-budget-item">
        <div class="category-budget-header">
          <div class="category-budget-name">
            <div class="category-dot" style="background:${cat.color}"></div>
            <span>${cat.icon} ${escHtml(cat.name)}</span>
            <span class="badge ${pct < 70 ? 'badge-green' : pct < 90 ? 'badge-yellow' : 'badge-red'}">${statusLabel}</span>
          </div>
          <div style="display:flex;gap:6px;align-items:center;">
            <div class="category-budget-amounts">${formatMoney(spent)} / ${cat.budget > 0 ? formatMoney(cat.budget) : '–'}</div>
            <button class="btn-icon btn-sm edit-cat-btn" data-id="${cat.id}" title="Bearbeiten" style="font-size:13px;">✏️</button>

        </div>
        ${cat.budget > 0 ? `<div class="progress-bar"><div class="progress-fill ${status}" style="width:${pct}%"></div></div>
        <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">${pct.toFixed(0)} % verbraucht · Noch ${formatMoney(Math.max(0, cat.budget - spent))} verfügbar</div>` : '<div style="font-size:12px;color:var(--text-muted);">Kein Budget-Limit gesetzt</div>'}

function renderPlanning() {
  const txs = getTransactionsForMonth(state.currentYear, state.currentMonth);
  const byCategory = {};
  txs.filter(t => t.type !== 'income').forEach(t => {
    byCategory[t.category] = (byCategory[t.category] || 0) + t.amount;
  });
  const stats = calcMonthStats(txs);

  const reportRows = state.categories.filter(c => c.budget > 0).map(cat => {
    const spent = byCategory[cat.id] || 0;
    const diff = cat.budget - spent;
    const isOver = diff < 0;
    return `<div class="report-row ${isOver ? 'over' : 'under'}">
      <div style="display:flex;align-items:center;gap:10px;">
        <span>${cat.icon} ${escHtml(cat.name)}</span>
        <span class="badge ${isOver ? 'badge-red' : 'badge-green'}">${isOver ? '▲ Überzogen' : '▼ Eingehalten'}</span>
      </div>
      <div style="text-align:right;">
        <div style="font-size:14px;font-weight:600;">${formatMoney(spent)}</div>
        <div style="font-size:12px;color:var(--text-muted);">Budget: ${formatMoney(cat.budget)} · ${isOver ? '–' : '+'}${formatMoney(Math.abs(diff))}</div>
      </div>
    </div>`;
  }).join('');

  return `
  <div class="section-header">
    <span class="section-title">Monatsplanung — ${getMonthName(state.currentYear, state.currentMonth)}</span>
  </div>

  <div class="grid-2" style="margin-bottom:16px;">
    <div class="card">
      <div class="card-title">Geplant vs. Ist (Ausgaben)</div>
      <div class="chart-container" style="height:280px;">
        <canvas id="planChart"></canvas>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Monatsabschluss-Report</div>
      <div style="margin-bottom:12px;padding:12px;background:var(--bg-tertiary);border-radius:var(--radius-sm);">
        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;">
          <span>Einnahmen</span><span style="color:var(--accent-green);font-weight:600;">${formatMoney(stats.income)}</span>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;">
          <span>Ausgaben (variabel)</span><span style="color:var(--accent-red);">${formatMoney(stats.expense)}</span>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;">
          <span>Fixkosten</span><span style="color:var(--accent-yellow);">${formatMoney(stats.fixed)}</span>
        </div>
        <hr class="divider" style="margin:8px 0;">
        <div style="display:flex;justify-content:space-between;font-size:14px;font-weight:600;">
          <span>Bilanz</span><span style="color:${stats.balance>=0?'var(--accent-green)':'var(--accent-red)'};">${formatMoney(stats.balance)}</span>
        </div>
      </div>
      ${reportRows || '<div style="color:var(--text-muted);font-size:13px;">Keine Budget-Limits gesetzt</div>'}
    </div>
  </div>
  `;
}

function initPlanningCharts() {
  const txs = getTransactionsForMonth(state.currentYear, state.currentMonth);
  const isDark = document.documentElement.dataset.theme !== 'light';
  const textColor = isDark ? '#8b8fa8' : '#5a5f7a';
  const gridColor = isDark ? '#2e3248' : '#d4d8ec';

  const byCategory = {};
  txs.filter(t => t.type !== 'income').forEach(t => {
    byCategory[t.category] = (byCategory[t.category] || 0) + t.amount;
  });
  const cats = state.categories.filter(c => c.budget > 0 || byCategory[c.id]);
  const planEl = document.getElementById('planChart');
  if (planEl && cats.length > 0) {
    chartInstances.plan = new Chart(planEl, {
      type: 'bar',
      data: {
        labels: cats.map(c => c.name),
        datasets: [
          { label: 'Budget', data: cats.map(c => c.budget), backgroundColor: 'rgba(79,142,247,0.4)', borderColor: 'rgba(79,142,247,0.8)', borderWidth: 1, borderRadius: 4 },
          { label: 'Ist', data: cats.map(c => byCategory[c.id]||0), backgroundColor: cats.map(c => {
            const pct = c.budget > 0 ? (byCategory[c.id]||0)/c.budget : 0;
            return pct > 1 ? 'rgba(241,103,103,0.7)' : pct > 0.9 ? 'rgba(245,197,66,0.7)' : 'rgba(62,207,142,0.7)';
          }), borderRadius: 4 },
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { labels: { color: textColor, font: { size: 12 } } },
          tooltip: { callbacks: { label: ctx => ` ${formatMoney(ctx.parsed.y)}` } }
        },
        scales: {
          x: { grid: { color: gridColor }, ticks: { color: textColor, maxRotation: 30 } },
          y: { grid: { color: gridColor }, ticks: { color: textColor, callback: v => v.toLocaleString('de-DE') + ' €' } }
        }
      }
    });
  } else if (planEl) {
    planEl.parentElement.innerHTML = '<div class="empty-state"><p>Keine Budgets gesetzt</p></div>';
  }
}

function exportCSV() {
  const header = ['Datum', 'Beschreibung', 'Kategorie', 'Typ', 'Betrag', 'Wiederkehrend'];
  const rows = state.transactions.map(t => {
    const cat = getCategoryById(t.category);
    const typeMap = { income: 'Einnahme', expense: 'Ausgabe', fixed: 'Fixkosten' };
    const recMap = { monthly: 'Monatlich', weekly: 'Wöchentlich', null: '', undefined: '' };
    return [t.date, `"${(t.description||'').replace(/"/g,'""')}"`, cat.name, typeMap[t.type]||t.type, t.amount.toFixed(2).replace('.',','), recMap[t.recurring]||''];
  });
  const csv = [header, ...rows].map(r => r.join(';')).join('\n');
  const bom = '﻿';
  downloadFile(bom + csv, `budgetplaner_${new Date().toISOString().split('T')[0]}.csv`, 'text/csv;charset=utf-8;');
  showToast('CSV exportiert');
}

function exportJSON() {
  downloadFile(JSON.stringify(state, null, 2), `budgetplaner_backup_${new Date().toISOString().split('T')[0]}.json`, 'application/json');
  showToast('JSON-Backup erstellt');
}

function importJSON(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.transactions || !data.categories) throw new Error('Ungültiges Format');
      openModal(`<div class="confirm-dialog">
        <div class="confirm-icon">⚠️</div>
        <h3>Backup importieren?</h3>
        <p>Alle aktuellen Daten werden durch das Backup ersetzt.<br>${data.transactions.length} Transaktionen, ${data.categories.length} Kategorien.</p>
      </div>`, {
        title: '',
        confirmLabel: 'Importieren',
        confirmClass: 'btn-danger',
        onConfirm: () => {
          state = { ...data, currentYear: new Date().getFullYear(), currentMonth: new Date().getMonth() };
          saveState();
          closeModal();
          renderPage();
          showToast('Backup importiert');
        }
      });
    } catch(err) {
      showToast('Fehler: Ungültige JSON-Datei', 'error');
    }
  };
  reader.readAsText(file);
}

function downloadFile(content, filename, mimeType) {
  const a = document.createElement('a');
  const blob = new Blob([content], { type: mimeType });
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function confirmReset() {
  openModal(`<div class="confirm-dialog">
    <div class="confirm-icon">🗑️</div>
    <h3>Alle Daten löschen?</h3>
    <p>Diese Aktion kann nicht rückgängig gemacht werden.<br>Alle Transaktionen und Einstellungen werden gelöscht.</p>
  </div>`, {
    title: '',
    confirmLabel: 'Ja, alles löschen',
    confirmClass: 'btn-danger',
    onConfirm: () => {
      localStorage.removeItem(STATE_KEY);
      state = initState();
      saveState();
      closeModal();
      renderPage();
      showToast('Daten zurückgesetzt', 'info');
    }
  });
}

// ============================================================
// EVENT DELEGATION
// ============================================================
function attachPageEvents() {
  const content = document.getElementById('pageContent');

  // Dashboard
  content.querySelector('#editSavingsGoalBtn')?.addEventListener('click', openSavingsGoalModal);

  // Transactions
  content.querySelector('#addTxBtn2')?.addEventListener('click', () => openTransactionModal());
  content.querySelector('#txSearch')?.addEventListener('input', e => { txFilter.search = e.target.value; renderPage(); });
  content.querySelector('#txCatFilter')?.addEventListener('change', e => { txFilter.category = e.target.value; renderPage(); });
  content.querySelector('#txTypeFilter')?.addEventListener('change', e => { txFilter.type = e.target.value; renderPage(); });

  content.querySelectorAll('.edit-tx-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const tx = state.transactions.find(t => t.id === btn.dataset.id);
      if (tx) openTransactionModal(tx);
    });
  });
  content.querySelectorAll('.delete-tx-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      openModal(`<div class="confirm-dialog">
        <div class="confirm-icon">🗑️</div>
        <h3>Transaktion löschen?</h3>
        <p>Diese Transaktion wird dauerhaft entfernt.</p>
      </div>`, {
        title: '',
        confirmLabel: 'Löschen',
        confirmClass: 'btn-danger',
        onConfirm: () => {
          state.transactions = state.transactions.filter(t => t.id !== btn.dataset.id);
          saveState();
          closeModal();
          renderPage();
          showToast('Transaktion gelöscht');
        }
      });
    });
  });

  // Categories
  content.querySelector('#addCatBtn')?.addEventListener('click', () => openCategoryModal());
  content.querySelectorAll('.edit-cat-btn').forEach(btn => {
    btn.addEventListener('click', () => openCategoryModal(btn.dataset.id));
  });
  content.querySelectorAll('.delete-cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      openModal(`<div class="confirm-dialog">
        <div class="confirm-icon">🗑️</div>
        <h3>Kategorie löschen?</h3>
        <p>Transaktionen in dieser Kategorie bleiben erhalten, werden aber der Kategorie "Sonstiges" zugewiesen.</p>
      </div>`, {
        title: '',
        confirmLabel: 'Löschen',
        confirmClass: 'btn-danger',
        onConfirm: () => {
          state.transactions.forEach(t => { if (t.category === btn.dataset.id) t.category = 'other'; });
          state.categories = state.categories.filter(c => c.id !== btn.dataset.id);
          saveState();
          closeModal();
          renderPage();
          showToast('Kategorie gelöscht');
        }
      });
    });
  });

  // Settings
  content.querySelector('#editGoalBtn')?.addEventListener('click', openSavingsGoalModal);
  content.querySelector('#exportCsvBtn')?.addEventListener('click', exportCSV);
  content.querySelector('#exportJsonBtn')?.addEventListener('click', exportJSON);
  content.querySelector('#importJsonInput')?.addEventListener('change', e => {
    if (e.target.files[0]) importJSON(e.target.files[0]);
  });
  content.querySelector('#resetBtn')?.addEventListener('click', confirmReset);
}

// ============================================================
// GLOBAL EVENTS
// ============================================================
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('show');
}

document.addEventListener('DOMContentLoaded', () => {
  // Navigation
  document.querySelectorAll('.nav-item, .bottom-nav-item').forEach(el => {
    el.addEventListener('click', () => navigate(el.dataset.page));
  });

  // Hamburger
  document.getElementById('hamburgerBtn').addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebarOverlay').classList.toggle('show');
  });
  document.getElementById('sidebarOverlay').addEventListener('click', closeSidebar);

  // Theme toggle
  document.getElementById('themeToggle').addEventListener('click', () => {
    const isDark = document.documentElement.dataset.theme === 'dark';
    document.documentElement.dataset.theme = isDark ? 'light' : 'dark';
    state.theme = isDark ? 'light' : 'dark';
    saveState();
    // Redraw charts with new theme
    Object.values(chartInstances).forEach(c => { try { c.destroy(); } catch(e){} });
    chartInstances = {};
    if (currentPage === 'dashboard') initDashboardCharts();
    if (currentPage === 'planning') initPlanningCharts();
  });

  // Add transaction button (topbar)
  document.getElementById('addTransactionBtn').addEventListener('click', () => openTransactionModal());

  // Month navigation
  document.getElementById('prevMonthBtn').addEventListener('click', () => {
    state.currentMonth--;
    if (state.currentMonth < 0) { state.currentMonth = 11; state.currentYear--; }
    updateMonthDisplay();
    renderPage();
  });
  document.getElementById('nextMonthBtn').addEventListener('click', () => {
    state.currentMonth++;
    if (state.currentMonth > 11) { state.currentMonth = 0; state.currentYear++; }
    updateMonthDisplay();
    renderPage();
  });

  // Apply saved theme
  if (state.theme) document.documentElement.dataset.theme = state.theme;

  updateMonthDisplay();

  // Init
  setTimeout(() => {
    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    renderPage();
  }, 600);
});

function updateMonthDisplay() {
  document.getElementById('currentMonthDisplay').textContent = getMonthName(state.currentYear, state.currentMonth);
}
</script>
</body>
</html>
